replicaCount: 1

image:
  registry: ""
  repository: bale-countries-check
  tag: latest
  pullPolicy: IfNotPresent

config:
  target_url: "https://next-ws.bale.ai/bale.auth.v1.Auth/"
  proxy:
    host: "p.webshare.io"
    port: "80"
    username: ""
    password: ""
  request_timeout: "15s"
  concurrent_workers: 50
  check_interval: "1h"
  https_port: ":443"

service:
  type: ClusterIP
  port: 443

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
  hosts:
    - host: bale-countries.local
      path: /
      pathType: Prefix
  tls:
    - secretName: bale-countries-check-tls
      hosts:
        - bale-countries.local

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi
